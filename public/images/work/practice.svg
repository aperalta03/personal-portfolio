<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect x="40" y="40" width="320" height="220" fill="#ebe8e1" fill-opacity="0.04" stroke="#ebe8e1" stroke-width="1.8" stroke-opacity="0.85"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#ebe8e1" font-weight="400">
    <text x="70" y="92" font-size="20" fill-opacity="0.85">y = mx + b</text>
    <text x="70" y="128" font-size="20" fill-opacity="0.85">f(x) = ax + c</text>
    <text x="70" y="164" font-size="20" fill="#7a1c2c">a^2 + b^2 = c^2</text>
    <text x="70" y="200" font-size="20" fill-opacity="0.85">P(A | B) = P(B|A)</text>
    <text x="70" y="236" font-size="20" fill-opacity="0.85">d/dx sin x = cos x</text>
  </g>
  <g stroke="#ebe8e1" stroke-width="1" opacity="0.4" stroke-linecap="round">
    <line x1="306" y1="48" x2="346" y2="48"/>
    <line x1="306" y1="56" x2="328" y2="56"/>
  </g>
</svg>
